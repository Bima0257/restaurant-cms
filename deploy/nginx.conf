# Restaurant CMS - Nginx Configuration
# Place in /etc/nginx/sites-available/restaurant-cms
# Then: ln -s /etc/nginx/sites-available/restaurant-cms /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;

    # --- Frontend (SvelteKit static build) ---
    root /var/www/restaurant-cms/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API proxy to FastAPI backend ---
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase timeout for long requests (e.g. backup/restore)
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
    }

    # --- Static uploads ---
    location /uploads/ {
        alias /opt/restaurant-cms/backend/storage/uploads/;
    }

    # ─── SSL will be added by certbot ───
}
