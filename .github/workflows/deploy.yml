name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: 20
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Frontend Build ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend (static)
        run: npm run build
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL || secrets.PUBLIC_API_URL }}
          PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}

      # ─── Backend Setup (validation) ──────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      # ─── Debug: Check workspace contents ─────────────────
      - name: Debug workspace
        run: |
          echo "=== Workspace contents ==="
          ls -la
          echo ""
          echo "=== Build folder ==="
          ls -la build/ 2>/dev/null || echo "build/ NOT FOUND"
          echo ""
          echo "=== Backend folder ==="
          ls -la backend/ 2>/dev/null || echo "backend/ NOT FOUND"
          echo ""
          echo "=== Deploy folder ==="
          ls -la deploy/ 2>/dev/null || echo "deploy/ NOT FOUND"

      # ─── Deploy via SSH ──────────────────────────────────
      - name: Install paramiko
        run: pip install paramiko

      - name: Deploy files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          python3 << 'PYEOF'
          import paramiko
          import os, sys, stat, socket

          host = os.environ["VPS_HOST"]
          user = os.environ["VPS_USER"]
          password = os.environ["VPS_PASSWORD"]
          port = int(os.environ.get("VPS_PORT", "22"))

          print(f"Connecting to {user}@{host}:{port}...")
          print(f"Password length: {len(password)}")

          client = paramiko.SSHClient()
          client.set_missing_host_key_policy(paramiko.AutoAddPolicy())

          try:
              client.connect(
                  host, port=port, username=user, password=password,
                  timeout=30, allow_agent=False, look_for_keys=False,
                  banner_timeout=15, auth_timeout=15
              )
          except paramiko.AuthenticationException as e:
              print(f"AUTH FAILED: {e}")
              sys.exit(1)
          except socket.timeout:
              print("TIMEOUT")
              sys.exit(1)
          except Exception as e:
              print(f"SSH CONNECT FAILED: {type(e).__name__}: {e}")
              sys.exit(1)

          print("SSH_OK - connected")

          sftp = client.open_sftp()

          def ensure_remote_dir(remote_path):
              try:
                  sftp.stat(remote_path)
              except FileNotFoundError:
                  parts = remote_path.strip("/").split("/")
                  current = ""
                  for part in parts:
                      current += "/" + part
                      try:
                          sftp.stat(current)
                      except FileNotFoundError:
                          sftp.mkdir(current)
                          print(f"  mkdir: {current}")

          def upload_dir(local_dir, remote_dir):
              print(f"\n=== Uploading {local_dir} -> {remote_dir} ===")
              ensure_remote_dir(remote_dir)
              for root, dirs, files in os.walk(local_dir):
                  rel = os.path.relpath(root, local_dir)
                  remote_sub = os.path.join(remote_dir, rel).replace("\\", "/")
                  if rel != ".":
                      ensure_remote_dir(remote_sub)
                  for f in files:
                      local_file = os.path.join(root, f)
                      remote_file = os.path.join(remote_sub, f).replace("\\", "/")
                      try:
                          sftp.put(local_file, remote_file)
                          print(f"  OK: {f}")
                      except Exception as e:
                          print(f"  FAIL: {f} - {e}")

          upload_dir("/github/workspace/build", "/opt/restaurant-cms/build")
          upload_dir("/github/workspace/backend", "/opt/restaurant-cms/backend")
          upload_dir("/github/workspace/deploy", "/opt/restaurant-cms/deploy")

          print("\n=== Verifying ===")
          stdin, stdout, stderr = client.exec_command("ls -la /opt/restaurant-cms/")
          print(stdout.read().decode())

          sftp.close()
          client.close()
          print("\nDeploy complete.")
          PYEOF

      - name: Copy frontend build to web root
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            # Ensure restaurant-app user exists
            id -u restaurant-app &>/dev/null || useradd -m -s /bin/bash restaurant-app

            # Copy to web root
            mkdir -p /var/www/restaurant-cms/frontend
            rsync -a --delete /opt/restaurant-cms/build/ /var/www/restaurant-cms/frontend/

            # Copy .env file if missing
            if [ ! -f /opt/restaurant-cms/.env ]; then
              cat > /opt/restaurant-cms/.env << 'EOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            SECRET_KEY=${{ secrets.BACKEND_SECRET_KEY }}
            ALGORITHM=HS256
            ACCESS_TOKEN_EXPIRE_MINUTES=1440
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RECAPTCHA_SITE_KEY=${{ secrets.RECAPTCHA_SITE_KEY }}
            RECAPTCHA_SECRET_KEY=${{ secrets.RECAPTCHA_SECRET_KEY }}
            EOF
              chown restaurant-app:restaurant-app /opt/restaurant-cms/.env
              chmod 600 /opt/restaurant-cms/.env
            fi

            # Setup Python venv if not exists
            if [ ! -f /opt/restaurant-cms/venv/bin/pip ]; then
              python3 -m venv /opt/restaurant-cms/venv
            fi

            # Install/update Python deps
            /opt/restaurant-cms/venv/bin/pip install -r /opt/restaurant-cms/backend/requirements.txt --quiet

            # Restart backend (skip if systemd not available)
            if command -v systemctl &>/dev/null; then
              systemctl daemon-reload 2>/dev/null || true
              systemctl restart restaurant-backend 2>/dev/null || echo "Backend service not yet configured"
            fi

            # Reload Nginx (skip if not installed)
            if command -v nginx &>/dev/null; then
              nginx -t && nginx -s reload || true
            fi

      # ─── Health Check ────────────────────────────────────
      - name: Health check
        run: |
          sleep 5
          curl -sSf --max-time 10 "${{ vars.PUBLIC_API_URL || secrets.PUBLIC_API_URL }}/health" || echo "Warning: health check failed (may be expected if setup not complete)"
